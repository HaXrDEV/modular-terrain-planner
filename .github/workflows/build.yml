name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}

    steps:
      - name: Create release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: windows-latest
            suffix: ""
            ext: ".exe"
          - os: macos-latest
            suffix: "-mac"
            ext: ""
          - os: ubuntu-latest
            suffix: "-linux"
            ext: ""

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgl1 libglib2.0-0 libxcb-cursor0 \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xfixes0 libegl1 xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate ICO
        if: runner.os != 'Linux'
        run: python build_icon.py

      - name: Generate ICO (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run python build_icon.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller
          --onefile
          --windowed
          --noconfirm
          --name "DungeonDesigner-${{ env.VERSION }}"
          --icon gui/icons/app_icon.ico
          "--add-data=gui/icons/app_icon.svg;gui/icons"
          --hidden-import PySide6.QtSvg
          --hidden-import PySide6.QtOpenGL
          --hidden-import PySide6.QtOpenGLWidgets
          --collect-all OpenGL
          --collect-all stl
          main.py

      - name: Build (macOS/Linux)
        if: runner.os != 'Windows'
        run: >
          pyinstaller
          --onefile
          --windowed
          --noconfirm
          --name "DungeonDesigner-${{ env.VERSION }}"
          --icon gui/icons/app_icon.ico
          "--add-data=gui/icons/app_icon.svg:gui/icons"
          --hidden-import PySide6.QtSvg
          --hidden-import PySide6.QtOpenGL
          --hidden-import PySide6.QtOpenGLWidgets
          --collect-all OpenGL
          --collect-all stl
          main.py

      - name: Rename artifact
        if: matrix.suffix != ''
        shell: bash
        run: mv "dist/DungeonDesigner-${{ env.VERSION }}" "dist/DungeonDesigner-${{ env.VERSION }}${{ matrix.suffix }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DungeonDesigner-${{ env.VERSION }}${{ matrix.suffix }}${{ matrix.ext }}
