<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bgGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1c1c38"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
    <radialGradient id="torchGlow" cx="22%" cy="22%" r="40%">
      <stop offset="0%" stop-color="#c87020" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#c87020" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="44" fill="url(#bgGrad)"/>
  <!-- Torch-light atmosphere -->
  <rect width="256" height="256" rx="44" fill="url(#torchGlow)"/>

  <!--
    2x2 isometric dungeon floor tiles
    Tile centres (screen):
      (0,0) → (128, 100)   (1,0) → (178, 125)
      (0,1) → ( 78, 125)   (1,1) → (128, 150)
    Diamond half-widths: w=50, h=25   Side depth: d=18
    Draw order: back → front  (top-left first, bottom-right last)
    For each tile: left-side → right-side → top (painter order)
  -->

  <!-- ── TILE (0,0)  centre (128, 100) ── -->
  <polygon points="78,100 128,125 128,143 78,118"   fill="#232335"/>
  <polygon points="128,125 178,100 178,118 128,143"  fill="#2e2e48"/>
  <polygon points="128,75 178,100 128,125 78,100"    fill="#6a6a84" stroke="#9898b8" stroke-width="1.2"/>
  <line x1="103" y1="87.5"  x2="153" y2="112.5" stroke="#3e3e58" stroke-width="1"/>
  <line x1="153" y1="87.5"  x2="103" y2="112.5" stroke="#3e3e58" stroke-width="1"/>
  <line x1="128" y1="75"    x2="178" y2="100"   stroke="#c0c0dc" stroke-width="1.6" opacity="0.60"/>
  <line x1="128" y1="75"    x2="78"  y2="100"   stroke="#c0c0dc" stroke-width="1.6" opacity="0.42"/>

  <!-- ── TILE (1,0)  centre (178, 125) ── -->
  <polygon points="128,125 178,150 178,168 128,143"  fill="#232335"/>
  <polygon points="178,150 228,125 228,143 178,168"  fill="#2e2e48"/>
  <polygon points="178,100 228,125 178,150 128,125"  fill="#64647e" stroke="#9898b8" stroke-width="1.2"/>
  <line x1="153" y1="112.5" x2="203" y2="137.5" stroke="#3e3e58" stroke-width="1"/>
  <line x1="203" y1="112.5" x2="153" y2="137.5" stroke="#3e3e58" stroke-width="1"/>
  <line x1="178" y1="100"   x2="228" y2="125"   stroke="#c0c0dc" stroke-width="1.6" opacity="0.60"/>
  <line x1="178" y1="100"   x2="128" y2="125"   stroke="#c0c0dc" stroke-width="1.6" opacity="0.42"/>

  <!-- ── TILE (0,1)  centre (78, 125) ── -->
  <polygon points="28,125 78,150 78,168 28,143"      fill="#232335"/>
  <polygon points="78,150 128,125 128,143 78,168"    fill="#2e2e48"/>
  <polygon points="78,100 128,125 78,150 28,125"     fill="#66667e" stroke="#9898b8" stroke-width="1.2"/>
  <line x1="53"  y1="112.5" x2="103" y2="137.5" stroke="#3e3e58" stroke-width="1"/>
  <line x1="103" y1="112.5" x2="53"  y2="137.5" stroke="#3e3e58" stroke-width="1"/>
  <line x1="78"  y1="100"   x2="128" y2="125"   stroke="#c0c0dc" stroke-width="1.6" opacity="0.60"/>
  <line x1="78"  y1="100"   x2="28"  y2="125"   stroke="#c0c0dc" stroke-width="1.6" opacity="0.42"/>

  <!-- ── TILE (1,1)  centre (128, 150) ── -->
  <polygon points="78,150 128,175 128,193 78,168"    fill="#232335"/>
  <polygon points="128,175 178,150 178,168 128,193"  fill="#2e2e48"/>
  <polygon points="128,125 178,150 128,175 78,150"   fill="#606078" stroke="#9898b8" stroke-width="1.2"/>
  <line x1="103" y1="137.5" x2="153" y2="162.5" stroke="#3e3e58" stroke-width="1"/>
  <line x1="153" y1="137.5" x2="103" y2="162.5" stroke="#3e3e58" stroke-width="1"/>
  <line x1="128" y1="125"   x2="178" y2="150"   stroke="#c0c0dc" stroke-width="1.6" opacity="0.60"/>
  <line x1="128" y1="125"   x2="78"  y2="150"   stroke="#c0c0dc" stroke-width="1.6" opacity="0.42"/>
</svg>
